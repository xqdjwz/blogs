    <script>
        let vditorInstance = null;
        let R2_DOMAIN = "";
        let currentFilterSeries = "";    
        let currentFilterCategory = "";  
        let currentSearchQuery = "";     
        
        let activeCategories = [];       
        let activeSeriesList = [];       
        let dbNavMeta = {};              
        let currentPageNum = 1;
        let globalLayoutMode = "standard";

        marked.setOptions({
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            },
            langPrefix: 'hljs language-'
        });

        window.addEventListener('hashchange', handleRouting);
        window.addEventListener('load', async () => {
            await loadSiteConfig(); 
            await fetchNavMeta();   
            handleRouting();        
        });

        function handleRouting() {
            const hash = window.location.hash;
            if (hash === '#/admin') {
                showAdminView();
            } else if (hash.startsWith('#/post/')) {
                const postId = hash.replace('#/post/', '');
                loadPost(postId);
            } else if (hash.startsWith('#/series/')) {
                const seriesName = decodeURIComponent(hash.replace('#/series/', ''));
                showSeriesView(seriesName);
            } else {
                showHomeView();
            }
        }

        async function loadSiteConfig() {
            try {
                const res = await fetch('./api/config?_t=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();
                
                const title = data.site_title || "Blogs.nyc.mn";
                const subtitle = data.site_subtitle || "无服务器数字花园";
                activeCategories = JSON.parse(data.site_categories || '["技术","教程","随笔","思考"]');
                activeSeriesList = JSON.parse(data.site_series || '["科学上网","谷歌系列","NAS系列"]');
                const rawNavLinks = JSON.parse(data.site_nav_links || '[{"name": "订阅转换", "url": "https://sub.blogs.nyc.mn"}, {"name": "IP查询", "url": "https://ip.blogs.nyc.mn"}, {"name": "It-Tools工具箱", "url": "https://it.blogs.nyc.mn"}]');
                globalLayoutMode = data.site_layout_mode || "standard";

                document.title = title;
                document.getElementById('nav-site-title').innerText = title;
                document.getElementById('site-title-display').innerText = title;
                document.getElementById('site-subtitle-display').innerText = subtitle;

                renderCustomNavbarLinks(rawNavLinks);

                document.getElementById('config-title').value = title;
                document.getElementById('config-subtitle').value = subtitle;
                document.getElementById('config-categories').value = activeCategories.join(', ');
                document.getElementById('config-series').value = activeSeriesList.join(', ');
                document.getElementById('config-nav-links').value = rawNavLinks.map(item => `${item.name}, ${item.url}`).join('\n');
                
                // 【黄金修复】：之前这里因漏了 config-layout-mode 的 HTML 元素，导致赋值时抛错阻断了页面标题加载
                setSelectValue('config-layout-mode', globalLayoutMode);

                renderCategoryFilters();

        function setSelectValue(id, val) {
            const el = document.getElementById(id);
            if (!el) return;
            
            let exists = false;
            for (let i = 0; i < el.options.length; i++) {
                if (el.options[i].value === val) {
                    exists = true;
                    break;
                }
            }
            if (!exists && val) {
                const opt = document.createElement('option');
                opt.value = val;
                opt.text = val;
                el.add(opt);
            }
            el.value = val;
        }

        async function fetchPostsAndRender(page = 1) {

                if (currentFilterSeries) url += `&series=${encodeURIComponent(currentFilterSeries)}`;
                if (currentSearchQuery) url += `&q=${encodeURIComponent(currentSearchQuery)}`;

                const response = await fetch(url);
                const resData = await response.json();
                
                const posts = resData.results;
                const total = resData.total;
                const limit = resData.limit;

                container.innerHTML = '';

                if (posts.length === 0) {
                    container.innerHTML = '<div class="col-span-full text-zinc-400 text-sm py-12 text-center">暂无发布内容。</div>';

                posts.forEach((post, index) => {

                        : `<div class="w-full h-full bg-gradient-to-tr ${getGradient(index)} flex items-center justify-center text-white/10 font-bold text-3xl select-none">BLOGS</div>`;

                    const summaryHtml = (globalLayoutMode !== 'simple')

                        : '';

                                    ${coverHtml}
                                    <span class="absolute top-3 left-3 bg-zinc-900/80 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur-sm uppercase">${post.category || '未分类'}</span>
                                </a>

                                    <h3 class="text-sm font-bold text-zinc-900 line-clamp-1 group-hover:text-amber-500 transition-colors">
                                        <a href="#/post/${post.id}">${post.title}</a>

                                <span>📅 ${post.date}</span>

                        </div>
                    `;
                });

                renderPagination(total, limit, page);

            } catch (err) {
                container.innerHTML = `<div class="col-span-full text-red-500 text-sm text-center">获取文章数据失败，请确认配置。</div>`;
            }
        }

        function renderPagination(total, limit, currentPage) {
            const container = document.getElementById('pagination-container');
            if (!container) return;

            const totalPages = Math.ceil(total / limit);
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let pageHtml = "";

            if (currentPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage - 1})" class="px-3.5 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] active:scale-95 rounded transition-all">« 上一页</button>`;
            }

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                pageHtml += `<button onclick="fetchPostsAndRender(1)" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">1</button>`;
                if (startPage > 2) {
                    pageHtml += `<span class="px-1 text-zinc-400 text-xs">...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    pageHtml += `<span class="px-3 py-1.5 text-xs font-bold bg-amber-500 text-white rounded shadow-sm">${i}</span>`;
                } else {
                    pageHtml += `<button onclick="fetchPostsAndRender(${i})" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">${i}</button>`;
                }
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) {
                    pageHtml += `<span class="px-1 text-zinc-400 text-xs">...</span>`;
                }
                pageHtml += `<button onclick="fetchPostsAndRender(${totalPages})" class="px-3 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] rounded transition-all">${totalPages}</button>`;
            }

            if (currentPage < totalPages) {
                pageHtml += `<button onclick="fetchPostsAndRender(${currentPage + 1})" class="px-3.5 py-1.5 text-xs font-semibold bg-[#343a40] text-gray-200 hover:bg-[#495057] active:scale-95 rounded transition-all">下一页 »</button>`;
            }

            container.innerHTML = pageHtml;
        }

        async function saveSiteConfig() {
            const password = getActivePassword();
            const title = safeGetValue('config-title').trim();
            const subtitle = safeGetValue('config-subtitle').trim();
            const categoriesStr = safeGetValue('config-categories').trim();
            const seriesStr = safeGetValue('config-series').trim();
            const navLinksStr = safeGetValue('config-nav-links').trim(); 
            const site_layout_mode = document.getElementById('config-layout-mode').value;
            const btn = document.getElementById('save-config-btn');

            if (!title) { alert('主标题不可为空'); return; }
            const categoriesArr = categoriesStr.split(',').map(c => c.trim()).filter(c => c.length > 0);
            const seriesArr = seriesStr.split(',').map(c => c.trim()).filter(c => c.length > 0);

            const navLinksArr = navLinksStr.split('\n').map(line => {
                const parts = line.split(',');
                const name = parts[0] ? parts[0].trim() : "";
                const url = parts[1] ? parts[1].trim() : "";
                return { name, url };
            }).filter(item => item.name && item.url);

            if (btn) {
                btn.innerText = '正在提交...';
                btn.disabled = true;
            }

            try {
                const res = await fetch('./api/config', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        site_title: title,
                        site_subtitle: subtitle,
                        site_categories: categoriesArr,
                        site_series: seriesArr,
                        site_nav_links: navLinksArr,
                        site_layout_mode
                    })
                });

                if (!res.ok) throw new Error();
                alert('配置修改成功！');
                await loadSiteConfig();
                await fetchNavMeta(); 
            } catch (e) {
                alert('修改失败');
            } finally {
                if (btn) {
                    btn.innerText = '更新配置（瞬间生效）';
                    btn.disabled = false;
                }
            }
        }

        async function uploadImageViaVditor(file) {
            const password = getActivePassword();
            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('./api/upload', {
                    method: 'POST',
                    headers: { 'Authorization': password },
                    body: formData
                });

                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();

                const urlObj = new URL(data.url);
                R2_DOMAIN = urlObj.origin;

                return data.url;
            } catch (err) {
                alert('图片同步到 R2 存储桶失败: ' + err.message);
                return null;
            }
        }

                const summary = safeGetValue('admin-summary').trim();
                const cover = safeGetValue('admin-cover').trim();
                const series = safeGetValue('admin-series') || '默认系列';
                const category = safeGetValue('admin-category') || '未分类';

                if (!vditorInstance) {
                    alert('系统检测到 Vditor 编辑器正在从云端加载中，请稍等 2 秒再试。');
                    return;
                }
                const content = vditorInstance.getValue();

                if (!id || !title || !content) {
                    alert('请完整填写文章 ID、标题和正文内容！');
                    return;
                }

                const btn = document.getElementById('publish-btn');
                if (btn) {
                    btn.innerText = '正在发布到 D1 与 R2...';
                    btn.disabled = true;
                }

                const res = await fetch('./api/posts', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, title, summary, content, category, cover, series,
                        layout_mode: globalLayoutMode, 
                        date: new Date().toISOString().split('T')[0]
                    })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章发布成功！');
                
                await refreshAdminTable();
                await fetchNavMeta(); 
                startNewPost();
                
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = '直接发布（瞬间生效）';
                }

            } catch (err) {
                alert('【发布失败】详细错误信息:\n' + err.message);
                const btn = document.getElementById('publish-btn');
                if (btn) {
                    btn.disabled = false;
                    btn.innerText = '直接发布（瞬间生效）';
                }
            }
        }

        async function editPost(index) {
            try {
                if (!window.allPosts || !window.allPosts[index]) {
                    alert('系统找不到该行的数据，请刷新列表重试。');
                    return;
                }
                const post = window.allPosts[index];

                isEditing = true;
                
                const editorTitle = document.getElementById('editor-title');
                if (editorTitle) editorTitle.innerText = `编辑教程: ${post.title || ''}`;
                const pubBtn = document.getElementById('publish-btn');
                if (pubBtn) pubBtn.innerText = '保存更新';
                
                const adminIdInput = document.getElementById('admin-id');
                if (adminIdInput) {
                    adminIdInput.value = post.id || '';
                    adminIdInput.disabled = true;
                }
                
                const adminTitle = document.getElementById('admin-title');
                if (adminTitle) adminTitle.value = post.title || '';
                const adminSummary = document.getElementById('admin-summary');
                if (adminSummary) adminSummary.value = post.summary || '';
                const adminCover = document.getElementById('admin-cover');
                if (adminCover) adminCover.value = post.cover || '';
                
                setSelectValue('admin-series', post.series || '默认系列');
                setSelectValue('admin-category', post.category || '未分类');

                if (!vditorInstance) {
                    alert('编辑器尚未加载完毕，请稍等。');
                    return;
                }
                vditorInstance.setValue('正在从 R2 提取正文内容...');

                const r2Base = R2_DOMAIN || `https://images.blogs.nyc.mn`;
                const res = await fetch(`${r2Base}/posts/${post.id}.md?_t=` + Date.now());
                if (!res.ok) throw new Error();
                const text = await res.text();
                vditorInstance.setValue(text);
                
                const editorZone = document.getElementById('editor-zone');
                if (editorZone) editorZone.scrollIntoView({ behavior: 'smooth' });

            } catch (e) {
                alert('从 R2 读取正文失败，请确认跨域 CORS 策略已经正常设置。');
                vditorInstance.setValue('');
            }
        }

        async function deletePost(id) {
            const password = getActivePassword();
            if (!confirm(`警告：该操作将同时清除 D1 中的该文章记录，并物理清除该文章引用的 R2 媒体文件，是否继续？`)) return;

            try {
                const res = await fetch('./api/delete', {
                    method: 'POST',
                    headers: { 'Authorization': password, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id })
                });

                if (!res.ok) throw new Error(await res.text());
                alert('文章和关联图片已完全物理销毁！');
                await refreshAdminTable();
                await fetchNavMeta(); 
            } catch (err) {
                alert('删除失败: ' + err.message);
            }
        }

        function cancelEdit() {
            startNewPost();
        }

        function addCopyButtons() {
            document.querySelectorAll('pre').forEach((preElement) => {
                if (preElement.parentElement.classList.contains('code-block-wrapper')) return;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                preElement.parentNode.insertBefore(wrapper, preElement);
                wrapper.appendChild(preElement);

                const button = document.createElement('button');
                button.className = 'copy-btn';
                button.innerText = '复制';
                button.addEventListener('click', () => {
                    const code = preElement.querySelector('code').innerText;
                    navigator.clipboard.writeText(code).then(() => {
                        button.innerText = '已复制';
                        setTimeout(() => button.innerText = '复制', 2000);
                    });
                });
                wrapper.appendChild(button);
            });
        }
    </script>
</body>
